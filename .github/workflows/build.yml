name: Plugin Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  plugin_test:
    name: asdf plugin test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-13]
        tool:
          - { plugin: clang-format, command: clang-format --version }
          - { plugin: clang-query, command: clang-query --version }
          - { plugin: clang-tidy, command: clang-tidy --version }
          - { plugin: clang-apply-replacements, command: clang-apply-replacements --version }

    runs-on: ${{ matrix.os }}

    steps:
      - name: Test plugin ${{ matrix.tool.plugin }}
        uses: asdf-vm/actions/plugin-test@v4
        env:
          ASDF_CLANG_TOOLS_MACOS_DEQUARANTINE: 1
        with:
          giturl: https://github.com/cpp-linter/asdf-clang-tools.git
          plugin: ${{ matrix.tool.plugin }}
          command: ${{ matrix.tool.command }}
